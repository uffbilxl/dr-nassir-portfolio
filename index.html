<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Nassir Mohamed Ibrahim | Senior Lecturer and Researcher</title>
    <meta name="description" content="From the shop floor to the lecture hall. Dr. Nassir Mohamed Ibrahim, Senior Lecturer at Birmingham City University, PhD holder, former JLR Technical Analyst and Adidas retail leader.">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script crossorigin src="https://unpkg.com/framer-motion@11.0.3/dist/framer-motion.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        card: '#0c0c18',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #03030a;
            background-image:
                linear-gradient(rgba(59,130,246,0.022) 1px, transparent 1px),
                linear-gradient(to right, rgba(59,130,246,0.022) 1px, transparent 1px);
            background-size: 72px 72px;
            color: #c8d3e0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .g-card {
            position: relative;
            isolation: isolate;
        }
        .g-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.09) 0%, rgba(255,255,255,0.02) 50%, rgba(59,130,246,0.07) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            transition: background 0.4s;
        }
        .g-card:hover::before {
            background: linear-gradient(135deg, rgba(59,130,246,0.55) 0%, rgba(59,130,246,0.1) 60%, rgba(59,130,246,0.3) 100%);
        }

        @keyframes marquee { from { transform: translateX(0) } to { transform: translateX(-50%) } }
        .marquee-track { animation: marquee 42s linear infinite; display: flex; width: max-content; }

        .tl-line {
            background: linear-gradient(to bottom, transparent 0%, #1e3a5f 20%, #3b82f6 50%, #1e3a5f 80%, transparent 100%);
        }

        .glow     { text-shadow: 0 0 48px rgba(59,130,246,0.55); }
        .glow-sm  { text-shadow: 0 0 22px rgba(59,130,246,0.4); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #03030a; }
        ::-webkit-scrollbar-thumb { background: #1a1a2e; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
        ::selection { background: rgba(59,130,246,0.22); color: #fff; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { motion, AnimatePresence, useScroll, useInView, useMotionValue, useSpring } = window.Motion;

    /* ── variants ── */
    const rise = {
        hidden: { opacity: 0, y: 44 },
        visible: { opacity: 1, y: 0, transition: { duration: 0.7, ease: [0.22, 1, 0.36, 1] } }
    };
    const riseL = {
        hidden: { opacity: 0, x: -44 },
        visible: { opacity: 1, x: 0, transition: { duration: 0.7, ease: [0.22, 1, 0.36, 1] } }
    };
    const riseR = {
        hidden: { opacity: 0, x: 44 },
        visible: { opacity: 1, x: 0, transition: { duration: 0.7, ease: [0.22, 1, 0.36, 1] } }
    };
    const cascade = {
        hidden: { opacity: 0 },
        visible: { opacity: 1, transition: { staggerChildren: 0.1 } }
    };
    const hov = { y: -6, transition: { type: 'spring', stiffness: 320, damping: 22 } };

    /* ── SVG icons (no emojis) ── */
    const Ic = {
        GradCap: () => (
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                <path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
        ),
        BarChart: () => (
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
                <line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/>
            </svg>
        ),
        Users: () => (
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
        ),
        Building: () => (
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <rect x="2" y="3" width="20" height="18" rx="1"/>
                <path d="M8 3v18M2 9h6M2 15h6M16 9h4M16 15h4M16 21v-6a2 2 0 0 0-4 0v6"/>
            </svg>
        ),
        BookOpen: () => (
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
        ),
        Search: () => (
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        ),
        Gear: () => (
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
        ),
        Database: () => (
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <ellipse cx="12" cy="5" rx="9" ry="3"/>
                <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
                <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
            </svg>
        ),
        Tag: () => (
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
                <line x1="7" y1="7" x2="7.01" y2="7"/>
            </svg>
        ),
    };

    /* ── splash ── */
    const Splash = ({ onDone }) => {
        const [splitting, setSplitting] = React.useState(false);

        React.useEffect(() => {
            const t = setTimeout(() => { setSplitting(true); onDone(); }, 1500);
            return () => clearTimeout(t);
        }, []);

        const letters = 'NASSIR.'.split('');

        return (
            <>
                {/* top panel */}
                <motion.div
                    className="fixed top-0 left-0 right-0 h-1/2 z-[500]"
                    style={{ background: '#03030a' }}
                    animate={{ y: splitting ? '-100%' : 0 }}
                    transition={{ duration: 0.7, ease: [0.76, 0, 0.24, 1] }}
                />
                {/* bottom panel */}
                <motion.div
                    className="fixed bottom-0 left-0 right-0 h-1/2 z-[500]"
                    style={{ background: '#03030a' }}
                    animate={{ y: splitting ? '100%' : 0 }}
                    transition={{ duration: 0.7, ease: [0.76, 0, 0.24, 1] }}
                />
                {/* text — sits above both panels */}
                <motion.div
                    className="fixed inset-0 z-[501] flex items-center justify-center pointer-events-none"
                    animate={{ opacity: splitting ? 0 : 1 }}
                    transition={{ duration: 0.15 }}
                >
                    <div className="text-center">
                        <div className="flex items-center justify-center">
                            {letters.map((l, i) => (
                                <div key={i} style={{ overflow: 'hidden', display: 'inline-block', lineHeight: 1.05 }}>
                                    <motion.span
                                        initial={{ y: '108%' }}
                                        animate={{ y: 0 }}
                                        transition={{ delay: i * 0.06, duration: 0.55, ease: [0.22, 1, 0.36, 1] }}
                                        className={`font-black tracking-tighter inline-block text-[13vw] sm:text-8xl md:text-9xl ${l === '.' ? 'text-primary glow' : 'text-white'}`}
                                    >
                                        {l}
                                    </motion.span>
                                </div>
                            ))}
                        </div>
                        <motion.div
                            initial={{ scaleX: 0, opacity: 0 }}
                            animate={{ scaleX: 1, opacity: 1 }}
                            transition={{ delay: 0.55, duration: 0.55, ease: [0.22, 1, 0.36, 1] }}
                            className="h-px w-28 bg-primary mx-auto mt-5 origin-left"
                        />
                        <motion.p
                            initial={{ opacity: 0, y: 8 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ delay: 0.9, duration: 0.4 }}
                            className="text-[0.625rem] font-mono uppercase tracking-[0.3em] text-slate-600 mt-4"
                        >
                            Senior Lecturer · PhD · BCU
                        </motion.p>
                    </div>
                </motion.div>
            </>
        );
    };

    /* ── progress bar ── */
    const ProgressBar = () => {
        const { scrollYProgress } = useScroll();
        return (
            <motion.div
                className="fixed top-0 left-0 right-0 h-[2px] bg-primary origin-left z-[200]"
                style={{ scaleX: scrollYProgress, boxShadow: '0 0 10px rgba(59,130,246,0.8)' }}
            />
        );
    };

    /* ── navbar ── */
    const Navbar = () => {
        const [open, setOpen] = React.useState(false);
        const [solid, setSolid] = React.useState(false);
        React.useEffect(() => {
            const cb = () => setSolid(window.scrollY > 24);
            window.addEventListener('scroll', cb, { passive: true });
            return () => window.removeEventListener('scroll', cb);
        }, []);
        const links = ['About', 'Journey', 'Skills', 'Experience'];
        return (
            <motion.header
                initial={{ y: -72, opacity: 0 }}
                animate={{ y: 0, opacity: 1 }}
                transition={{ type: 'spring', stiffness: 90, damping: 20, delay: 0.1 }}
                className={`fixed top-0 left-0 right-0 z-[100] transition-all duration-500 ${solid ? 'bg-[#03030a]/92 backdrop-blur-xl border-b border-white/[0.06]' : ''}`}
            >
                <div className="max-w-[1440px] mx-auto px-6 sm:px-10 lg:px-16 flex items-center justify-between h-16">
                    <button onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                        className="text-[1.1rem] font-black text-white tracking-tight select-none">
                        Nassir<motion.span animate={{ opacity: [1, 0.2, 1] }} transition={{ duration: 2.4, repeat: Infinity }} className="text-primary glow-sm">.</motion.span>
                    </button>
                    <nav className="hidden md:flex items-center gap-9 text-[0.8125rem] font-semibold text-slate-400">
                        {links.map(l => (
                            <a key={l} href={`#${l.toLowerCase()}`} className="relative group hover:text-white transition-colors duration-200">
                                {l}
                                <span className="absolute -bottom-0.5 left-0 h-px w-0 bg-primary transition-all duration-300 group-hover:w-full" />
                            </a>
                        ))}
                    </nav>
                    <a href="#contact" className="hidden md:inline-flex items-center gap-1.5 bg-primary text-black text-[0.8125rem] font-bold px-5 py-2 rounded-full hover:bg-white transition-colors duration-200">
                        Get in Touch <span className="text-base leading-none">+</span>
                    </a>
                    <button onClick={() => setOpen(v => !v)} className="md:hidden p-1.5 text-white" aria-label="menu">
                        {open
                            ? <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
                            : <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/></svg>
                        }
                    </button>
                </div>
                <AnimatePresence>
                    {open && (
                        <motion.div initial={{ opacity: 0, height: 0 }} animate={{ opacity: 1, height: 'auto' }} exit={{ opacity: 0, height: 0 }}
                            className="md:hidden border-t border-white/[0.07] bg-[#03030a]/98 backdrop-blur-xl overflow-hidden">
                            <div className="px-6 py-7 flex flex-col gap-5 text-center">
                                {links.map(l => (
                                    <a key={l} href={`#${l.toLowerCase()}`} onClick={() => setOpen(false)}
                                       className="text-slate-300 font-semibold text-base hover:text-primary transition-colors">{l}</a>
                                ))}
                                <a href="#contact" onClick={() => setOpen(false)} className="bg-primary text-black font-bold py-3 rounded-xl text-sm mt-1">Get in Touch</a>
                            </div>
                        </motion.div>
                    )}
                </AnimatePresence>
            </motion.header>
        );
    };

    /* ── hero ── */
    const Hero = () => {
        const mx = useMotionValue(0);
        const my = useMotionValue(0);
        React.useEffect(() => {
            const h = e => { mx.set((e.clientX / window.innerWidth - 0.5) * 14); my.set((e.clientY / window.innerHeight - 0.5) * 14); };
            window.addEventListener('mousemove', h, { passive: true });
            return () => window.removeEventListener('mousemove', h);
        }, []);

        const words = ['Dr.', 'Nassir', 'Mohamed', 'Ibrahim'];

        return (
            <section className="relative min-h-[100svh] flex flex-col justify-center pt-20 pb-24 max-w-[1440px] mx-auto px-6 sm:px-10 lg:px-16">

                {/* bg orbs */}
                <div className="pointer-events-none absolute inset-0 overflow-hidden">
                    <motion.div animate={{ scale: [1,1.2,1], opacity: [0.08,0.13,0.08] }} transition={{ duration: 11, repeat: Infinity }}
                        className="absolute -top-1/4 -left-1/4 w-[80vw] h-[80vw] md:w-[50vw] md:h-[50vw] rounded-full bg-primary blur-[160px]" />
                    <motion.div animate={{ scale: [1,1.1,1], opacity: [0.04,0.07,0.04] }} transition={{ duration: 15, repeat: Infinity, delay: 3 }}
                        className="absolute -bottom-1/3 -right-1/4 w-[70vw] h-[70vw] md:w-[45vw] md:h-[45vw] rounded-full bg-blue-700 blur-[180px]" />
                </div>

                <div className="relative z-10 grid lg:grid-cols-12 gap-12 lg:gap-16 items-center">

                    {/* LEFT: name + tagline + CTAs */}
                    <motion.div variants={cascade} initial="hidden" animate="visible" className="lg:col-span-7 space-y-7">
                        <motion.div variants={rise} className="inline-flex items-center gap-2.5">
                            <motion.span animate={{ scale: [1,1.6,1], opacity: [1,0.3,1] }} transition={{ duration: 2.2, repeat: Infinity }}
                                className="w-2 h-2 rounded-full bg-primary block" />
                            <span className="text-primary text-[0.6875rem] font-bold uppercase tracking-[0.28em]">
                                PhD · Senior Lecturer · Birmingham City University
                            </span>
                        </motion.div>

                        <div className="overflow-hidden">
                            {words.map((w, i) => (
                                <motion.span
                                    key={w}
                                    variants={{
                                        hidden: { y: '110%', opacity: 0 },
                                        visible: { y: 0, opacity: 1, transition: { duration: 0.8, ease: [0.22, 1, 0.36, 1], delay: i * 0.1 } }
                                    }}
                                    className={`inline-block mr-[0.15em] text-[13vw] leading-[0.88] sm:text-[4.25rem] md:text-[5.5rem] lg:text-[5.75rem] xl:text-[7rem] font-black tracking-tighter ${i >= 2 ? 'text-primary glow' : 'text-white'}`}
                                >
                                    {w}
                                </motion.span>
                            ))}
                        </div>

                        <motion.p variants={rise} className="text-slate-300 text-lg sm:text-xl md:text-2xl font-light leading-relaxed max-w-xl">
                            From the <strong className="text-white font-semibold">shop floor</strong> to the{' '}
                            <strong className="text-white font-semibold">lecture hall.</strong>{' '}
                            A career built across three industries. A reminder that the best paths are rarely straight.
                        </motion.p>

                        <motion.div variants={rise} className="flex flex-col sm:flex-row gap-4 pt-2">
                            <motion.a whileHover={{ scale: 1.04, boxShadow: '0 0 44px rgba(59,130,246,0.5)' }} whileTap={{ scale: 0.96 }}
                                href="#journey"
                                className="flex items-center justify-center gap-2.5 bg-primary text-black font-bold px-8 py-4 rounded-xl text-[0.9375rem]">
                                Explore the Journey
                                <motion.span animate={{ x: [0, 5, 0] }} transition={{ duration: 1.6, repeat: Infinity }}>+</motion.span>
                            </motion.a>
                            <motion.a whileHover={{ scale: 1.04, backgroundColor: 'rgba(255,255,255,0.06)' }} whileTap={{ scale: 0.96 }}
                                href="https://www.linkedin.com/in/nassir1/" target="_blank" rel="noopener noreferrer"
                                className="flex items-center justify-center gap-2.5 border border-white/[0.14] bg-white/[0.03] text-white font-semibold px-8 py-4 rounded-xl text-[0.9375rem]">
                                LinkedIn Profile <span className="text-primary text-lg leading-none">+</span>
                            </motion.a>
                        </motion.div>
                    </motion.div>

                    {/* RIGHT: credentials panel */}
                    <motion.div
                        initial={{ opacity: 0, x: 50 }}
                        animate={{ opacity: 1, x: 0 }}
                        transition={{ delay: 0.8, duration: 0.9, ease: [0.22, 1, 0.36, 1] }}
                        className="hidden lg:flex lg:col-span-5 flex-col gap-4"
                    >
                        {/* Current role card */}
                        <div className="g-card bg-card rounded-2xl p-7 border border-primary/20">
                            <div className="flex items-center justify-between mb-4">
                                <span className="text-[0.625rem] font-black uppercase tracking-[0.22em] px-3 py-1 rounded-full bg-primary/20 text-primary">Current Role</span>
                                <div className="flex items-center gap-1.5">
                                    <span className="w-2 h-2 rounded-full bg-emerald-400 animate-ping" />
                                    <span className="text-[0.625rem] text-emerald-400 font-mono font-bold">NOW</span>
                                </div>
                            </div>
                            <div className="text-2xl font-black text-white tracking-tight mb-1">Senior Lecturer</div>
                            <div className="text-primary text-sm font-semibold mb-3">Birmingham City University</div>
                            <div className="text-slate-500 text-xs font-mono">April 2024 - Present</div>
                        </div>

                        {/* PhD card */}
                        <div className="g-card bg-card rounded-2xl p-6">
                            <div className="flex items-start gap-4">
                                <div className="p-3 rounded-xl bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 shrink-0">
                                    <Ic.Search />
                                </div>
                                <div>
                                    <div className="text-[0.625rem] font-bold uppercase tracking-[0.2em] text-slate-600 mb-0.5">Doctorate of Philosophy</div>
                                    <div className="text-white font-bold text-sm mb-0.5">PhD Awarded 2021</div>
                                    <div className="text-slate-500 text-xs font-mono">Birmingham City University</div>
                                </div>
                            </div>
                        </div>

                        {/* Mini stats row */}
                        <div className="grid grid-cols-3 gap-3">
                            {[
                                { val: '10+', label: 'Years\nExperience' },
                                { val: '3', label: 'Industries\nMastered' },
                                { val: '7+', label: 'Years\nRetail Mgmt' },
                            ].map((s, i) => (
                                <div key={i} className="g-card bg-card rounded-xl p-4 text-center">
                                    <div className="text-2xl font-black text-primary glow-sm">{s.val}</div>
                                    <div className="text-[0.6rem] text-slate-500 font-mono uppercase tracking-wide mt-1 whitespace-pre-line leading-tight">{s.label}</div>
                                </div>
                            ))}
                        </div>

                        {/* Domains */}
                        <div className="flex gap-2.5">
                            {['Retail', 'Analytics', 'Academia'].map((d) => (
                                <div key={d} className="flex-1 g-card bg-card rounded-xl px-3 py-3 text-center">
                                    <div className="text-white font-bold text-xs">{d}</div>
                                </div>
                            ))}
                        </div>
                    </motion.div>
                </div>

                {/* scroll cue */}
                <motion.div
                    animate={{ opacity: [0.3, 0.7, 0.3], y: [0, 6, 0] }}
                    transition={{ duration: 2.2, repeat: Infinity }}
                    className="absolute bottom-10 left-6 sm:left-10 lg:left-16 flex flex-col items-center gap-2"
                >
                    <div className="h-10 w-px bg-gradient-to-b from-transparent to-primary/60" />
                    <span className="text-[0.625rem] font-mono uppercase tracking-[0.2em] text-slate-600">Scroll</span>
                </motion.div>
            </section>
        );
    };

    /* ── ticker ── */
    const Ticker = () => {
        const items = [
            'PhD · Birmingham City University',
            'Senior Lecturer',
            'Technical Analyst · Jaguar Land Rover',
